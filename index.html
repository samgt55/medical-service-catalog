<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogo de Servicios Medicos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Catalogo de Servicios Medicos</h1>
      <p class="subtitle">Directorio operativo de proveedores</p>
    </div>
  </header>
  <nav class="tab-bar">
    <button class="tab active" data-tab="teleconsulta">Teleconsulta</button>
    <button class="tab" data-tab="domicilio">Domicilio</button>
    <button class="tab" data-tab="prescripcion">Prescripcion</button>
    <button class="tab" data-tab="especialidades">Especialidades</button>
    <button class="tab" data-tab="clinicas">Clinicas</button>
  </nav>
  <main>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Buscar por nombre, pais, ciudad..." />
      <select id="country-filter">
        <option value="">Todos los paises</option>
        <option>Alemania</option>
        <option>Andorra</option>
        <option>Argentina</option>
        <option>Aruba</option>
        <option>Brasil</option>
        <option>Bulgaria</option>
        <option>Canada</option>
        <option>Croacia</option>
        <option>Egipto</option>
        <option>Espana</option>
        <option>Francia</option>
        <option>Global</option>
        <option>Hungria</option>
        <option>Italia</option>
        <option>Malasia</option>
        <option>Paises Bajos</option>
        <option>Peru</option>
        <option>Polonia</option>
        <option>Portugal</option>
        <option>Republica Checa</option>
        <option>Tailandia</option>
        <option>Venezuela</option>
      </select>
    </div>
    <div id="cards-container"></div>
  </main>
  <footer>
    <p>Actualizado: Junio 2026 - Uso interno operativo</p>
  </footer>
  <script src="data/services.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
